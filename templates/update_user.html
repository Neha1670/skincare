<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update User</title>
  <style>
    body { font-family: Arial; padding:20px; }
    form { max-width:400px; margin:auto; display:flex; flex-direction:column; gap:12px; }
    input { padding:10px; border:1px solid #ccc; border-radius:5px; }
    button { padding:10px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#218838; }
  </style>
</head>
<body>
  <h2>Update User</h2>
  <form method="POST" action="{{ url_for('update_user', id=user[0]) }}">

    <label>Name:</label>
    <input type="text" name="name" value="{{ user[1] }}" required>
    <label>Email:</label>
    <input type="email" name="email" value="{{ user[2] }}" required>
    <label>Mobile:</label>
    <input type="text" name="mobile" value="{{ user[3] }}" required pattern="\d{10}">
    <label>Username:</label>
    <input type="text" name="username" value="{{ user[4] }}" required>
    <button type="submit">Update User</button>
  </form>
  <br>
  <a href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>
</body>
</html>
