{% extends "base.html" %}

{% block title %}Hair{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/nehu.css') }}">

<!-- Heading -->
<div class="center-text text-center my-6">
  <h2 class="text-3xl font-bold text-purple-700">🌟 Hair Products</h2>
  <p class="text-gray-600 text-sm mt-1">Most loved hair care products by our users</p>
</div>

<!-- Rectangular cards grid -->
<div class="product-grid">
  {% for product in products %}
  <div class="product-card">
    <img src="{{ url_for('static', filename='images/' ~ product.image) }}" alt="{{ product.name }}">
    <div class="card-body">
      <h3 class="product-name">{{ product.name }}</h3>
      <p class="price">{{ product.price }}</p>
      <button class="buy-btn">Buy Now 🛍️</button>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
